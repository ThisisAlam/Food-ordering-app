<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My App</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <header class="">
            <h1 class="floating-label">Jimmy's Food</h1>
            <img class="coverImg" id="coverImgId" src="images/coverImage-2.png" 
            alt="Wide banner for “Jimmy’s Food” featuring pizza, burger, fries, and beer on a bright festive background.">
        </header>
    <main>
        <section class="complete-menu-form">
            <div class="menu-container" id="menu-container">
            </div>
            <div class="form-update-container">
                <div class="form-order ">
                    <p class="order-form-title">Your order</p>
                    <div class="order-container" id="order-container">
                        <div class="order">
                            <p class="name">pizza</p>
                            <div class="button-container">
                                <button class="remove-btn">remover</button>
                            </div>
                            <p class="price">Price:</p>
                        </div>
                        <div class="order">
                            <p class="name">beer</p>
                            <div class="button-container">
                                <button class="remove-btn">remover</button>
                            </div>
                            <p class="price">Price:</p>
                        </div>
                        <div class="order">
                            <p class="name">burger</p>
                            <div class="button-container">
                                <button class="remove-btn">remover</button>
                            </div>
                            <p class="price">Price:</p>
                        </div>
                    </div>
                    <div class="total-price-container">
                            <p class="total-price-tag">Total Price:</p>
                            <p class="total-price">Price:</p>
                        </div>
                    <button class="complete-order-btn">Complete Order</button>
                </div>
            </div>
            <div class="overlay hidden">
                <div class="card-details">
                    <h2>Enter card details</h2>
                    <input type="text" placeholder="Enter your name" required>
                    <input type="number" placeholder="Enter card number" required>
                    <input type="number" placeholder="Enter CVV" required>
                    <button type="submit" class="pay-btn">Pay</button>
                </div>
            </div>
        </section>
    </main>
	    <script src="index.js" type="module"></script>
    </body>
</html>
